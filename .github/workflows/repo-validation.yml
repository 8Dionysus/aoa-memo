name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Repo Validation
    runs-on: ubuntu-latest
    env:
      AOA_AGENTS_ROOT: ${{ github.workspace }}/.deps/aoa-agents
      AOA_EVALS_ROOT: ${{ github.workspace }}/.deps/aoa-evals
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Checkout aoa-agents
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-agents
          ref: bf974accbf426a0574c3e63e2c13fef76057e190
          path: .deps/aoa-agents

      - name: Checkout aoa-evals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-evals
          ref: bf868625bcce22292d128874889d9666ff3a9df8
          path: .deps/aoa-evals

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run release audit
        run: python scripts/release_check.py
